<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 编辑器</title>
  <meta name="theme-color" content="#d4a5c9">
  <link rel="icon" type="image/png" sizes="32x32" href="iris/icons/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="iris/styles.css">
  <link rel="stylesheet" href="iris/css/themes/themes.css">
  <link rel="stylesheet" href="iris/vendor/katex/katex.min.css">
  <link rel="stylesheet" href="iris/vendor/highlight.js/styles/github.css" id="hljs-theme">
  <link rel="stylesheet" href="iris/vendor/diff2html/css/diff2html.min.css">
  <link rel="stylesheet" href="iris/css/editor.css">
</head>
<body class="editor-body">
  <!-- 顶部工具栏 -->
  <header class="editor-toolbar">
    <div class="toolbar-left">
      <a href="index.html" class="toolbar-home" title="返回文档站">← 文档站</a>
      <span class="toolbar-divider"></span>
      <span class="toolbar-title">Markdown 编辑器</span>
      <span class="toolbar-badge" id="cellCountBadge">1 Cell</span>
    </div>
    <div class="toolbar-center">
      <!-- Markdown 语法 -->
      <div class="toolbar-dropdown" data-dropdown="markdown">
        <button class="toolbar-btn" title="Markdown 基础语法">Markdown ▾</button>
        <div class="dropdown-menu" id="dropdownMarkdown">
          <div class="dropdown-group">
            <div class="dropdown-group-title">标题</div>
            <button class="dropdown-item" data-insert="# ">H1 标题</button>
            <button class="dropdown-item" data-insert="## ">H2 标题</button>
            <button class="dropdown-item" data-insert="### ">H3 标题</button>
            <button class="dropdown-item" data-insert="#### ">H4 标题</button>
          </div>
          <div class="dropdown-group">
            <div class="dropdown-group-title">格式</div>
            <button class="dropdown-item" data-insert="**粗体**" data-cursor="-4">粗体 <kbd>Ctrl+B</kbd></button>
            <button class="dropdown-item" data-insert="*斜体*" data-cursor="-2">斜体 <kbd>Ctrl+I</kbd></button>
            <button class="dropdown-item" data-insert="~~删除线~~" data-cursor="-4">删除线</button>
            <button class="dropdown-item" data-insert="`行内代码`" data-cursor="-2">行内代码 <kbd>Ctrl+`</kbd></button>
          </div>
          <div class="dropdown-group">
            <div class="dropdown-group-title">插入</div>
            <button class="dropdown-item" data-insert="[链接文字](url)">链接 <kbd>Ctrl+K</kbd></button>
            <button class="dropdown-item" data-insert="![图片描述](url)">图片</button>
            <button class="dropdown-item" data-insert="\n```\n\n```\n" data-cursor="-5">代码块</button>
            <button class="dropdown-item" data-insert="\n| 列1 | 列2 | 列3 |\n|------|------|------|\n| 内容 | 内容 | 内容 |\n">表格</button>
            <button class="dropdown-item" data-insert="> ">引用</button>
            <button class="dropdown-item" data-insert="- ">无序列表</button>
            <button class="dropdown-item" data-insert="1. ">有序列表</button>
            <button class="dropdown-item" data-insert="> [ ] 任务项">任务列表</button>
            <button class="dropdown-item" data-insert="---\n">分隔线</button>
          </div>
        </div>
      </div>

      <!-- HTML 原生标记 -->
      <div class="toolbar-dropdown" data-dropdown="html">
        <button class="toolbar-btn" title="HTML 原生标签">HTML ▾</button>
        <div class="dropdown-menu" id="dropdownHtml">
          <button class="dropdown-item" data-insert="<details>\n<summary>点击展开</summary>\n\n内容\n\n</details>" data-cursor="-15">折叠面板</button>
          <button class="dropdown-item" data-insert="<mark>高亮文字</mark>" data-cursor="-8">高亮 mark</button>
          <button class="dropdown-item" data-insert="H<sub>2</sub>O">下标 sub</button>
          <button class="dropdown-item" data-insert="x<sup>2</sup>" >上标 sup</button>
          <button class="dropdown-item" data-insert="<abbr title=\"全称\">缩写</abbr>">缩写 abbr</button>
          <button class="dropdown-item" data-insert="<kbd>Ctrl+C</kbd>">键盘键位 kbd</button>
        </div>
      </div>

      <!-- 私有语法 -->
      <div class="toolbar-dropdown" data-dropdown="private">
        <button class="toolbar-btn" title="本站私有语法">私有语法 ▾</button>
        <div class="dropdown-menu" id="dropdownPrivate">
          <div class="dropdown-group">
            <div class="dropdown-group-title">画廊样式</div>
            <button class="dropdown-item" data-insert="@grid\n">@grid 网格</button>
            <button class="dropdown-item" data-insert="@cardstack\n">@cardstack 扑克牌堆</button>
            <button class="dropdown-item" data-insert="@filmstrip\n">@filmstrip 胶片条</button>
            <button class="dropdown-item" data-insert="@polaroid\n">@polaroid 拍立得墙</button>
            <button class="dropdown-item" data-insert="@stack\n">@stack 堆叠覆盖</button>
            <button class="dropdown-item" data-insert="@mosaic\n">@mosaic 马赛克</button>
            <button class="dropdown-item" data-insert="@scattered\n">@scattered 散落明信片</button>
            <button class="dropdown-item" data-insert="@hexagon\n">@hexagon 蜂巢六边形</button>
            <button class="dropdown-item" data-insert="@coverflow\n">@coverflow Cover Flow</button>
            <button class="dropdown-item" data-insert="@tape\n">@tape 软木板留言墙</button>
            <button class="dropdown-item" data-insert="@duotone\n">@duotone 双色调</button>
            <button class="dropdown-item" data-insert="@frame\n">@frame 画框装裱</button>
            <button class="dropdown-item" data-insert="@arch\n">@arch 拱形画廊</button>
            <button class="dropdown-item" data-insert="@masonry\n">@masonry 瀑布流</button>
            <button class="dropdown-item" data-insert="@slider\n">@slider 幻灯片</button>
            <button class="dropdown-item" data-insert="@ticket\n">@ticket 票根</button>
            <button class="dropdown-item" data-insert="@panorama\n">@panorama 全景横幅</button>
          </div>
          <div class="dropdown-group">
            <div class="dropdown-group-title">GitHub 提示框</div>
            <button class="dropdown-item" data-insert="> [!NOTE]\n> ">[!NOTE] 提示</button>
            <button class="dropdown-item" data-insert="> [!IMPORTANT]\n> ">[!IMPORTANT] 重要</button>
            <button class="dropdown-item" data-insert="> [!WARNING]\n> ">[!WARNING] 警告</button>
            <button class="dropdown-item" data-insert="> [!TIP]\n> ">[!TIP] 建议</button>
            <button class="dropdown-item" data-insert="> [!CAUTION]\n> ">[!CAUTION] 谨慎</button>
          </div>
          <div class="dropdown-group">
            <div class="dropdown-group-title">其他</div>
            <button class="dropdown-item" data-insert="---\ntitle: \ndate: \n---\n">Frontmatter 头信息</button>
          </div>
        </div>
      </div>

      <!-- 工具渲染 -->
      <div class="toolbar-dropdown" data-dropdown="tools">
        <button class="toolbar-btn" title="集成的工具渲染语法">工具渲染 ▾</button>
        <div class="dropdown-menu" id="dropdownTools">
          <div class="dropdown-group">
            <div class="dropdown-group-title">图表</div>
            <button class="dropdown-item" data-insert="```mermaid\ngraph TD\n    A --> B\n```" data-cursor="-6">Mermaid 流程图</button>
            <button class="dropdown-item" data-insert="```mermaid\nsequenceDiagram\n    Alice->>Bob: Hello\n    Bob-->>Alice: Hi\n```" data-cursor="-6">Mermaid 时序图</button>
            <button class="dropdown-item" data-insert="```plantuml\n@startuml\nAlice -> Bob: Hello\n@enduml\n```" data-cursor="-6">PlantUML 时序图</button>
            <button class="dropdown-item" data-insert="```apexcharts\n{\"chart\":{\"type\":\"bar\"},\"series\":[{\"data\":[30,40,35]}],\"xaxis\":{\"categories\":[\"A\",\"B\",\"C\"]}}\n```" data-cursor="-6">ApexCharts 柱状图</button>
            <button class="dropdown-item" data-insert="```apexcharts\n{\"chart\":{\"type\":\"line\"},\"series\":[{\"data\":[10,20,15,30]}],\"xaxis\":{\"categories\":[\"1\",\"2\",\"3\",\"4\"]}}\n```" data-cursor="-6">ApexCharts 折线图</button>
          </div>
          <div class="dropdown-group">
            <div class="dropdown-group-title">代码与数学</div>
            <button class="dropdown-item" data-insert="```diff\n+ 新增行\n- 删除行\n```" data-cursor="-6">Diff 差异</button>
            <button class="dropdown-item" data-insert="$$\nE = mc^2\n$$" data-cursor="-4">KaTeX 数学公式块</button>
            <button class="dropdown-item" data-insert="$E = mc^2$" data-cursor="-1">KaTeX 行内公式</button>
          </div>
          <div class="dropdown-group">
            <div class="dropdown-group-title">地理</div>
            <button class="dropdown-item" data-insert="```geo\n{\"lat\":39.9042,\"lng\":116.4074,\"zoom\":12}\n```" data-cursor="-6">Geo 地图</button>
          </div>
        </div>
      </div>

      <!-- 下载 -->
      <div class="toolbar-dropdown" data-dropdown="download">
        <button class="toolbar-btn" title="导出文件">下载 ▾</button>
        <div class="dropdown-menu" id="dropdownDownload">
          <div class="dropdown-group">
            <div class="dropdown-group-title">当前 Cell</div>
            <button class="dropdown-item" data-action="download-md">下载源文件 (.md)</button>
            <button class="dropdown-item" data-action="download-html">下载渲染结果 (.html)</button>
            <button class="dropdown-item" data-action="download-pdf">导出 PDF (.pdf)</button>
          </div>
          <div class="dropdown-group">
            <div class="dropdown-group-title">整个笔记本</div>
            <button class="dropdown-item" data-action="download-notebook">导出笔记本 (.mdnb)</button>
            <button class="dropdown-item" data-action="download-all-md">合并导出全部 (.md)</button>
          </div>
        </div>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-icon-btn" id="clearAllBtn" title="清空所有 Cell">🗑</button>
      <button class="toolbar-run-btn" id="runAllBtn" title="运行全部 Cell (Ctrl+Shift+Enter)">⚡ 全部运行</button>
      <button class="toolbar-run-btn primary" id="runCurrentBtn" title="运行当前 Cell (Ctrl+Enter)">▶ 运行</button>
    </div>
  </header>

  <!-- Cell 容器 -->
  <main class="editor-main" id="editorMain">
    <!-- Cells will be dynamically created by editor.js -->
  </main>

  <!-- 底部状态栏 -->
  <footer class="editor-statusbar">
    <div class="statusbar-left">
      <span id="statusCellCount">1 Cell</span>
      <span class="statusbar-sep">·</span>
      <span id="statusWords">0 字</span>
      <span class="statusbar-sep">·</span>
      <span id="statusLines">0 行</span>
    </div>
    <div class="statusbar-right">
      <span id="statusCursor">行 1, 列 1</span>
      <span class="statusbar-sep">·</span>
      <span id="statusActive">无活跃 Cell</span>
    </div>
  </footer>

  <!-- 选中文字浮动工具栏 -->
  <div class="selection-toolbar" id="selectionToolbar">
    <button class="sel-btn" data-format="bold" title="粗体 (Ctrl+B)"><strong>B</strong></button>
    <button class="sel-btn" data-format="italic" title="斜体 (Ctrl+I)"><em>I</em></button>
    <button class="sel-btn" data-format="strike" title="删除线"><s>S</s></button>
    <button class="sel-btn" data-format="code" title="行内代码 (Ctrl+`)"><code>&lt;/&gt;</code></button>
    <span class="sel-divider"></span>
    <button class="sel-btn" data-format="h1" title="一级标题">H1</button>
    <button class="sel-btn" data-format="h2" title="二级标题">H2</button>
    <button class="sel-btn" data-format="h3" title="三级标题">H3</button>
    <span class="sel-divider"></span>
    <button class="sel-btn" data-format="link" title="链接 (Ctrl+K)">🔗</button>
    <button class="sel-btn" data-format="quote" title="引用">❝</button>
    <button class="sel-btn" data-format="ul" title="无序列表">•</button>
  </div>

  <!-- Cell 右键上下文菜单 -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-group">
      <div class="context-menu-item" data-action="ctx-run">▶ 运行此 Cell</div>
      <div class="context-menu-item" data-action="ctx-run-below">⬇ 运行此 Cell 及下方</div>
    </div>
    <div class="context-menu-separator"></div>
    <div class="context-menu-group">
      <div class="context-menu-item" data-action="ctx-insert-above">⬆ 上方插入 Cell</div>
      <div class="context-menu-item" data-action="ctx-insert-below">⬇ 下方插入 Cell</div>
    </div>
    <div class="context-menu-separator"></div>
    <div class="context-menu-group">
      <div class="context-menu-item" data-action="ctx-move-up">⬆ 上移</div>
      <div class="context-menu-item" data-action="ctx-move-down">⬇ 下移</div>
      <div class="context-menu-item" data-action="ctx-duplicate">⧉ 复制 Cell</div>
    </div>
    <div class="context-menu-separator"></div>
    <div class="context-menu-group">
      <div class="context-menu-item" data-action="ctx-clear-output">✕ 清空输出</div>
      <div class="context-menu-item" data-action="ctx-clear-content">⊘ 清空内容</div>
      <div class="context-menu-item context-menu-item-danger" data-action="ctx-delete">🗑 删除 Cell</div>
    </div>
  </div>

  <!-- 补全提示 -->
  <div class="autocomplete-list" id="autocompleteList"></div>

  <!-- Scripts: 复用主站的渲染管线 -->
  <script src="iris/vendor/marked.js"></script>
  <script src="iris/vendor/highlight.js/highlight.min.js"></script>
  <script src="iris/vendor/mermaid.min.js"></script>
  <script src="iris/vendor/pako.min.js"></script>
  <script src="iris/vendor/apexcharts.min.js"></script>
  <script src="iris/vendor/diff2html/js/diff2html.min.js"></script>
  <script src="iris/vendor/diff2html/js/diff2html-ui.min.js"></script>
  <script src="iris/vendor/katex/katex.min.js"></script>
  <script src="iris/vendor/katex/auto-render.min.js"></script>
  <script src="iris/js/config.js"></script>
  <script src="iris/js/state.js"></script>
  <script src="iris/js/dom.js"></script>
  <script src="iris/js/markdown.js"></script>
  <script src="iris/js/plugins/loader.js"></script>
  <script src="iris/js/renderers/mermaid.js"></script>
  <script src="iris/js/renderers/plantuml.js"></script>
  <script src="iris/js/renderers/apexcharts.js"></script>
  <script src="iris/js/renderers/diff.js"></script>
  <script src="iris/js/renderers/geo.js"></script>
  <script src="iris/js/renderers/embedded.js"></script>
  <script src="iris/js/renderers/katex.js"></script>
  <script src="iris/js/editor.js"></script>
</body>
</html>
