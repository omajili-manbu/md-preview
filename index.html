<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">
          <span class="mode-toggle active" id="modeFiles" data-mode="files">Files</span>
          <span class="mode-divider">/</span>
          <span class="mode-toggle" id="modeIndex" data-mode="index">Index</span>
        </h1>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
      <div class="search-container">
        <input type="search" id="searchInput" placeholder="搜索文档..." />
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="file-tree" id="fileTree"></div>
      <div class="index-tree hidden" id="indexTree"></div>
    </aside>
    
    <main class="main-content">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      
      <div class="page-header" id="pageHeader">
        <div class="page-breadcrumbs" id="pageBreadcrumbs"></div>
        <a href="#" class="edit-page-btn" id="editPageBtn" target="_blank" rel="noopener noreferrer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          编辑此页
        </a>
      </div>
      
      <article class="markdown-body" id="markdownContent">
        <div class="welcome-state">
          <p class="welcome-text">选择一个文件开始阅读</p>
        </div>
      </article>
      
      <div class="reading-progress" id="readingProgress">
        <div class="reading-progress-bar"></div>
      </div>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.31/dist/flexsearch.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.2.2/dist/abcjs-basic.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/verovio@3.15.0/dist/verovio-toolkit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@0.9.2/build/opensheetmusicdisplay.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/css/diff2html.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/js/diff2html.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/js/diff2html-ui.min.js"></script>
  <script async src="https://platform.twitter.com/widgets.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        primaryColor: '#d4a5c9',
        primaryTextColor: '#333333',
        primaryBorderColor: '#d4a5c9',
        lineColor: '#888888',
        secondaryColor: '#f2c4ce',
        tertiaryColor: '#f8f8f8',
        background: '#ffffff',
        mainBkg: '#ffffff',
        nodeBorder: '#d4a5c9',
        clusterBkg: '#f8f8f8',
        titleColor: '#333333',
        edgeLabelBackground: '#ffffff'
      },
      flowchart: {
        useMaxWidth: true,
        htmlLabels: true,
        curve: 'basis'
      },
      sequence: {
        useMaxWidth: true,
        diagramMarginX: 20,
        diagramMarginY: 20
      }
    });
  </script>
  <!-- App Modules -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/file-tree.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/search.js"></script>
  
  <!-- Renderers -->
  <script src="js/renderers/mermaid.js"></script>
  <script src="js/renderers/plantuml.js"></script>
  <script src="js/renderers/apexcharts.js"></script>
  <script src="js/renderers/music-notation.js"></script>
  <script src="js/renderers/diff.js"></script>
  <script src="js/renderers/geo.js"></script>
  <script src="js/renderers/embedded.js"></script>
  
  <!-- Main Entry -->
  <script src="app.js"></script>
</body>
</html>
