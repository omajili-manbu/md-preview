<!--
  Packet Tracer 设备 SVG 图标库
  图标来源：VMware Clarity Icons (MIT) — https://github.com/vmware-archive/clarity-assets
            Tabler Icons (MIT) — https://github.com/tabler/tabler-icons  （仅 laptop）
  统一风格：outline/line 线性图标。Clarity 的 -line 变体为基于 fill 的描边轮廓
  （viewBox 0 0 36 36）；Tabler 为基于 stroke 的描边（viewBox 0 0 24 24）。
  颜色通过 currentColor 适配亮/暗主题。
  使用方式：<svg class="pkt-device-icon"><use href="#pkt-router"/></svg>
  或经 pkt-renderer.js 的 getIconDataURI() 提取为 data-URI 节点背景图。
-->
