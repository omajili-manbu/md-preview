<!--
  Packet Tracer 设备 SVG 图标库
  紫粉风格统一设计，stroke=currentColor 适配亮/暗主题
  使用方式：<svg class="pkt-device-icon"><use href="#pkt-router"/></svg>
-->
<svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
  <!-- 路由器：圆柱体 + 箭头 -->
  <symbol id="pkt-router" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="6" y="10" width="20" height="12" rx="2"/>
    <circle cx="11" cy="16" r="1.2" fill="currentColor"/>
    <circle cx="15" cy="16" r="1.2" fill="currentColor"/>
    <path d="M22 13l3-2M25 11l0 2M25 13l-3 0"/>
    <path d="M22 19l3 2M25 21l0-2M25 19l-3 0"/>
  </symbol>

  <!-- 交换机：矩形 + 端口阵列 -->
  <symbol id="pkt-switch" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="11" width="24" height="10" rx="2"/>
    <path d="M8 16h2M12 16h2M16 16h2M20 16h2M24 16h0.5"/>
    <path d="M9 13v-2M13 13v-2M17 13v-2M21 13v-2"/>
    <circle cx="9" cy="18" r="0.8" fill="currentColor"/>
    <circle cx="13" cy="18" r="0.8" fill="currentColor"/>
  </symbol>

  <!-- PC：显示器 + 底座 -->
  <symbol id="pkt-pc" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="6" width="22" height="15" rx="2"/>
    <path d="M12 26h8M16 21v5"/>
    <path d="M9 11h14M9 14h8"/>
  </symbol>

  <!-- 服务器：机箱 + 槽位 -->
  <symbol id="pkt-server" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="7" y="5" width="18" height="22" rx="2"/>
    <path d="M10 10h12M10 14h12M10 18h12M10 22h8"/>
    <circle cx="22" cy="22" r="0.8" fill="currentColor"/>
    <circle cx="22" cy="18" r="0.8" fill="currentColor"/>
  </symbol>

  <!-- 笔记本：折叠屏 + 键盘 -->
  <symbol id="pkt-laptop" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 7h18v12H7z"/>
    <path d="M4 22h24l-2 3H6z"/>
    <path d="M12 11h8"/>
  </symbol>

  <!-- 防火墙：砖墙 + 火焰 -->
  <symbol id="pkt-firewall" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="8" width="22" height="18" rx="1"/>
    <path d="M5 14h22M5 19h22M12 8v5M20 8v5M9 14v5M16 14v5M23 14v5M12 19v7M20 19v7"/>
    <path d="M16 3c1 2 3 3 3 5 0 1.5-1.3 3-3 3s-3-1.5-3-3c0-2 2-3 3-5z" fill="currentColor" opacity="0.3"/>
  </symbol>

  <!-- IP 电话：手机听筒 + 按键 -->
  <symbol id="pkt-phone" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="5" width="14" height="22" rx="2"/>
    <path d="M12 9h8"/>
    <circle cx="13" cy="14" r="0.8" fill="currentColor"/>
    <circle cx="16" cy="14" r="0.8" fill="currentColor"/>
    <circle cx="19" cy="14" r="0.8" fill="currentColor"/>
    <circle cx="13" cy="18" r="0.8" fill="currentColor"/>
    <circle cx="16" cy="18" r="0.8" fill="currentColor"/>
    <circle cx="19" cy="18" r="0.8" fill="currentColor"/>
    <path d="M14 23h4"/>
  </symbol>

  <!-- 无线接入点：WiFi 波纹 -->
  <symbol id="pkt-access-point" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 24v-4"/>
    <circle cx="16" cy="26" r="1.5" fill="currentColor"/>
    <path d="M10 20a8 8 0 0 1 12 0"/>
    <path d="M6 16a14 14 0 0 1 20 0"/>
    <path d="M2 12a20 20 0 0 1 28 0"/>
  </symbol>

  <!-- 云：标准云形状 -->
  <symbol id="pkt-cloud" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 22a5 5 0 0 1 0-10 7 7 0 0 1 13.5-2 4.5 4.5 0 0 1 1.5 8.5 5 5 0 0 1-5 3.5z"/>
    <path d="M12 18h8M14 21h4"/>
  </symbol>

  <!-- 集线器：圆形 + 多端口 -->
  <symbol id="pkt-hub" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="16" cy="16" r="8"/>
    <path d="M16 8v4M16 20v4M8 16h4M20 16h4M10.3 10.3l2.8 2.8M18.9 18.9l2.8 2.8M21.7 10.3l-2.8 2.8M13.1 18.9l-2.8 2.8"/>
  </symbol>

  <!-- 电视 -->
  <symbol id="pkt-tv" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="7" width="24" height="16" rx="2"/>
    <path d="M12 27h8M16 23v4"/>
    <path d="M9 13l4 3-4 3M14 19h6"/>
  </symbol>

  <!-- 平板 -->
  <symbol id="pkt-tablet" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="7" y="4" width="18" height="24" rx="2"/>
    <path d="M14 25h4"/>
    <path d="M11 10h10M11 14h10M11 18h6"/>
  </symbol>

  <!-- 未知设备：问号 -->
  <symbol id="pkt-unknown" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="6" y="6" width="20" height="20" rx="3" stroke-dasharray="3 2"/>
    <path d="M12 13a4 4 0 1 1 6 3.5c-1 0.7-2 1.3-2 2.5"/>
    <circle cx="16" cy="22" r="0.8" fill="currentColor"/>
  </symbol>
</svg>
